# Fly.io deployment config for NestJS API
app = "chatvibe-api"
primary_region = "bom"

[build]
  dockerfile = "apps/api/Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  concurrency = { type = "connections", hard_limit = 250, soft_limit = 200 }

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "4000"
  WEB_APP_URL = "https://chatvibe-web.fly.dev"
  API_URL = "https://chatvibe-api.fly.dev"
  SOCKET_URL = "wss://chatvibe-socket.fly.dev"
  NEXT_PUBLIC_API_URL = "https://chatvibe-api.fly.dev/api/v1"
  NEXT_PUBLIC_SOCKET_URL = "wss://chatvibe-socket.fly.dev"

[deploy]
  release_command = "npx prisma db push && npx prisma generate"

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.concurrency]]
    type = "connections"
    hard_limit = 250
    soft_limit = 200
