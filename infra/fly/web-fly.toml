# Fly.io deployment config for Next.js Web App
app = "chatvibe-web"
primary_region = "bom"

[build]
  dockerfile = "apps/web/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  concurrency = { type = "connections", hard_limit = 500, soft_limit = 300 }

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_API_URL = "https://chatvibe-api.fly.dev/api/v1"
  NEXT_PUBLIC_SOCKET_URL = "wss://chatvibe-socket.fly.dev"
  NEXT_PUBLIC_APP_URL = "https://chatvibe-web.fly.dev"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.concurrency]]
    type = "connections"
    hard_limit = 500
    soft_limit = 300
