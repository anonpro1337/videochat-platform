apiVersion: apps/v1
kind: Deployment
metadata:
  name: videochat-socket
  namespace: videochat
spec:
  replicas: 3
  selector:
    matchLabels:
      app: videochat-socket
  template:
    metadata:
      labels:
        app: videochat-socket
    spec:
      containers:
        - name: socket
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/videochat-socket:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: videochat-config
            - secretRef:
                name: videochat-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: videochat-socket
  namespace: videochat
spec:
  selector:
    app: videochat-socket
  ports:
    - port: 4001
      targetPort: 4001
  type: ClusterIP
