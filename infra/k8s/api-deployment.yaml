apiVersion: apps/v1
kind: Deployment
metadata:
  name: videochat-api
  namespace: videochat
spec:
  replicas: 3
  selector:
    matchLabels:
      app: videochat-api
  template:
    metadata:
      labels:
        app: videochat-api
    spec:
      containers:
        - name: api
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/videochat-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: videochat-config
            - secretRef:
                name: videochat-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: videochat-api
  namespace: videochat
spec:
  selector:
    app: videochat-api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
