services:
  - type: web
    name: videochat-api
    runtime: node
    repo: https://github.com/anonpro1337/videochat-platform
    branch: main
    rootDir: apps/api
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @videochat/api build
    startCommand: pnpm --filter @videochat/api start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: SOCKET_URL
        sync: false
